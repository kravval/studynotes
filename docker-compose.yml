services:
  db:
    image: postgres:16
    container_name: studynotes-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5555:5432"
    volumes:
      - studynotes-data:/var/lib/postgresql/data

volumes:
  studynotes-data: