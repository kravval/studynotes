<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('StudyNotes — ' + ${note.title})}"></head>

<body>
<header th:replace="~{fragments/header :: header}"></header>

<main>
    <h1 th:text="${note.title}">Заголовок заметки</h1>

    <div class="note-meta">
    <span th:if="${note.folderPath != null}">
        Папка: <span th:text="${note.folderPath}" class="folder-badge">Java / Core</span>
        &nbsp;|&nbsp;
    </span>
        <span>Создано: <span th:text="${note.createdAt}">2026-03-14</span></span>
        <span th:if="${note.updatedAt != null}">
        | Обновлено: <span th:text="${note.updatedAt}">2026-03-15</span>
    </span>
    </div>

    <div class="note-content" th:utext="${renderedContent}">
        Содержимое заметки.
    </div>

    <div class="note-actions">
        <a th:href="@{/notes/{id}/edit(id=${note.id})}" class="btn">Редактировать</a>
        <form th:action="@{/notes/{id}/delete(id=${note.id})}" method="post"
              style="display: inline;"
              onsubmit="return confirm('Удалить заметку? Это действие нельзя отменить.');">
            <button type="submit" class="btn btn-danger">Удалить</button>
        </form>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
