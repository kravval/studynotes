<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'StudyNotes — ' + ${note.title}">StudyNotes — Заметка</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<!-- Навигация -->
<nav>
    <a th:href="@{/notes}">← Назад к списку</a>
</nav>

<!-- Заголовок заметки -->
<h1 th:text="${note.title}">Заголовок заметки</h1>

<!-- Метаинформация -->
<div class="note-meta">
    <span>Создано: <span th:text="${note.createdAt}">2026-03-14</span></span>
    <span th:if="${note.updatedAt != null}">
            | Обновлено: <span th:text="${note.updatedAt}">2026-03-15</span>
        </span>
</div>

<!-- Содержимое заметки -->
<div class="note-content">
    <p th:text="${note.content}">Здесь будет содержимое заметки.</p>
</div>

<!-- Действия -->
<div class="note-actions">
    <a th:href="@{/notes/{id}/edit(id=${note.id})}" class="btn">Редактировать</a>
    <a th:href="@{/notes/{id}/delete(id=${note.id})}" class="btn btn-danger">Удалить</a>
</div>
</body>
</html>
