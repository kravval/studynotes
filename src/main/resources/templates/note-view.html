<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('StudyNotes — ' + ${note.title})}"></head>

<body>
<header th:replace="~{fragments/header :: header}"></header>

<main class="container">
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/notes}">Заметки</a></li>
            <li th:if="${note.folderName != null}" class="breadcrumb-item"
                th:text="${note.folderPath}">Java / Core</li>
            <li class="breadcrumb-item active" th:text="${note.title}">Заметка</li>
        </ol>
    </nav>

    <h1 class="mb-2" th:text="${note.title}">Заголовок заметки</h1>

    <div class="text-muted small mb-4">
        <span th:if="${note.folderPath != null}">
            <span class="badge bg-light text-primary" th:text="${note.folderPath}">Java / Core</span>
            &nbsp;·&nbsp;
        </span>
        <span>Создано: <span th:text="${#temporals.format(note.createdAt, 'dd.MM.yyyy HH:mm')}">14.03.2026</span></span>
        <span th:if="${note.updatedAt != null}">
            &nbsp;·&nbsp; Обновлено: <span th:text="${#temporals.format(note.updatedAt, 'dd.MM.yyyy HH:mm')}">15.03.2026</span>
        </span>
    </div>

    <!-- Оглавление — сворачиваемое, только если есть заголовки -->
    <details th:if="${!headings.isEmpty()}" class="mb-4">
        <summary class="btn btn-sm btn-outline-secondary">Содержание</summary>
        <nav class="mt-2 ps-3 border-start">
            <a th:each="heading : ${headings}"
               th:href="'#' + ${heading.slug}"
               th:text="${heading.text}"
               th:classappend="${heading.level == 3} ? ' ms-3' : ''"
               class="d-block text-decoration-none text-muted small mb-1">
                Заголовок
            </a>
        </nav>
    </details>

    <!-- Содержимое заметки -->
    <div class="note-content" th:utext="${renderedContent}">
        Содержимое заметки.
    </div>

    <div class="d-flex gap-2 mt-4 mb-3">
        <a th:href="@{/notes/{id}/edit(id=${note.id})}" class="btn btn-primary">Редактировать</a>
        <form th:action="@{/notes/{id}/delete(id=${note.id})}" method="post"
              onsubmit="return confirm('Удалить заметку? Это действие нельзя отменить.');">
            <button type="submit" class="btn btn-danger">Удалить</button>
        </form>
    </div>
</main>

<div th:replace="~{fragments/scripts :: scripts}"></div>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
