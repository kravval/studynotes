<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyNotes — Мои заметки</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<h1>Мои заметки</h1>

<a th:href="@{/notes/new}" class="btn">Создать заметку</a>

<!-- Сообщение, если заметок нет -->
<p th:if="${notes.isEmpty()}" class="empty-message">
    Заметок пока нет. Создайте первую!
</p>

<!-- Таблица с заметками -->
<table th:if="${!notes.isEmpty()}">
    <thead>
    <tr>
        <th>ID</th>
        <th>Заголовок</th>
        <th>Дата создания</th>
        <th>Действия</th>
    </tr>
    </thead>
    <tbody>
    <!-- Thymeleaf повторит этот <tr> для каждой заметки -->
    <tr th:each="note : ${notes}">
        <td th:text="${note.id}">1</td>
        <td>
            <a th:href="@{/notes/{id}(id=${note.id})}"
               th:text="${note.title}">Stream API</a>
        </td>
        <td th:text="${note.createdAt}">2026-03-14</td>
        <td>
            <a th:href="@{/notes/{id}/edit(id=${note.id})}">Редактировать</a>
            <a th:href="@{/notes/{id}/delete(id=${note.id})}"
               class="delete-link">Удалить</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
