<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('StudyNotes — Мои заметки')}"></head>

<body>
<header th:replace="~{fragments/header :: header}"></header>

<main>
    <h1>Мои заметки</h1>

    <p th:if="${notes.isEmpty()}" class="empty-message">
        Заметок пока нет. Создайте первую!
    </p>

    <table th:if="${!notes.isEmpty()}">
        <thead>
        <tr>
            <th>ID</th>
            <th>Заголовок</th>
            <th>Дата создания</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="note : ${notes}">
            <td th:text="${note.id}">1</td>
            <td>
                <a th:href="@{/notes/{id}(id=${note.id})}"
                   th:text="${note.title}">Stream API</a>
            </td>
            <td th:text="${note.createdAt}">2026-03-14</td>
            <td>
                <a th:href="@{/notes/{id}/edit(id=${note.id})}">Редактировать</a>
                <form th:action="@{/notes/{id}/delete(id=${note.id})}" method="post"
                      style="display: inline;"
                      onsubmit="return confirm('Удалить заметку?');">
                    <button type="submit" class="link-button delete-link">Удалить</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
