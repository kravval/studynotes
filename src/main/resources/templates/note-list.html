<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('StudyNotes — Мои заметки')}"></head>

<body>
<header th:replace="~{fragments/header :: header}"></header>

<main class="container">
    <div class="row">
        <!-- Боковая панель -->
        <aside class="col-md-3">
            <h6 class="text-muted text-uppercase mb-3">Папки</h6>
            <div class="list-group list-group-flush">
                <a th:href="@{/notes}"
                   th:classappend="${selectedFolderId == null} ? ' active' : ''"
                   class="list-group-item list-group-item-action">
                    Все заметки
                </a>
                <div th:each="folder : ${folders}">
                    <a th:href="@{/notes(folderId=${folder.id})}"
                       th:text="${folder.name}"
                       th:classappend="${selectedFolderId != null && selectedFolderId == folder.id} ? ' active' : ''"
                       class="list-group-item list-group-item-action">
                        Папка
                    </a>
                    <!-- Дочерние папки -->
                    <div th:if="${!folder.children.isEmpty()}">
                        <a th:each="child : ${folder.children}"
                           th:href="@{/notes(folderId=${child.id})}"
                           th:text="${child.name}"
                           th:classappend="${selectedFolderId != null && selectedFolderId == child.id} ? ' active' : ''"
                           class="list-group-item list-group-item-action ps-4">
                            Подпапка
                        </a>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Основной контент -->
        <section class="col-md-9">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h1 class="h3 mb-0">Мои заметки</h1>
                <a th:href="@{/notes/new}" class="btn btn-primary btn-sm">Создать заметку</a>
            </div>

            <p th:if="${notes.isEmpty()}" class="text-muted fst-italic">
                Заметок пока нет. Создайте первую!
            </p>

            <table th:if="${!notes.isEmpty()}" class="table table-hover">
                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Заголовок</th>
                    <th>Папка</th>
                    <th>Создано</th>
                    <th>Действия</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="note : ${notes}">
                    <td th:text="${note.id}">1</td>
                    <td>
                        <a th:href="@{/notes/{id}(id=${note.id})}"
                           th:text="${note.title}">Stream API</a>
                    </td>
                    <td>
                            <span th:if="${note.folderPath != null}"
                                  th:text="${note.folderPath}"
                                  class="badge bg-light text-primary">Java / Core</span>
                        <span th:if="${note.folderPath == null}"
                              class="badge bg-light text-muted">Корень</span>
                    </td>
                    <td th:text="${#temporals.format(note.createdAt, 'dd.MM.yyyy')}">14.03.2026</td>
                    <td>
                        <a th:href="@{/notes/{id}/edit(id=${note.id})}"
                           class="btn btn-outline-secondary btn-sm me-1">Редактировать</a>
                        <form th:action="@{/notes/{id}/delete(id=${note.id})}" method="post"
                              style="display: inline;"
                              onsubmit="return confirm('Удалить заметку?');">
                            <button type="submit" class="btn btn-outline-danger btn-sm">Удалить</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </section>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
