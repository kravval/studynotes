<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(${noteId != null} ? 'StudyNotes — Редактировать' : 'StudyNotes — Новая заметка')}"></head>

<body>
<header th:replace="~{fragments/header :: header}"></header>

<main>
    <h1 th:text="${noteId != null} ? 'Редактировать заметку' : 'Новая заметка'">
        Заметка
    </h1>

    <form th:action="${noteId != null} ? @{/notes/{id}(id=${noteId})} : @{/notes}"
          th:object="${noteRequest}"
          method="post">

        <div class="form-group">
            <label for="title">Заголовок</label>
            <input type="text" id="title" th:field="*{title}"
                   placeholder="Введите заголовок" required>
        </div>

        <div class="form-group">
            <label for="content">Содержимое</label>
            <textarea id="content" th:field="*{content}" rows="15"
                      placeholder="Введите содержимое в формате Markdown"></textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn">Сохранить</button>
            <a th:href="${noteId != null} ? @{/notes/{id}(id=${noteId})} : @{/notes}"
               class="btn btn-cancel">Отмена</a>
        </div>
    </form>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
