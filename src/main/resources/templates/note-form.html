<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(${noteId != null} ? 'StudyNotes — Редактировать' : 'StudyNotes — Новая заметка')}"></head>

<body>
<header th:replace="~{fragments/header :: header}"></header>

<main class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="note-form-card">
                <div class="note-form-header">
                    <h1 class="h5 mb-0"
                        th:text="${noteId != null} ? 'Редактировать заметку' : 'Новая заметка'">
                        Заметка
                    </h1>
                    <p class="text-muted small mb-0 mt-1">Markdown поддерживается</p>
                </div>

                <div class="note-form-body">
                    <form th:action="${noteId != null} ? @{/notes/{id}(id=${noteId})} : @{/notes}"
                          th:object="${noteRequest}"
                          method="post">

                        <div class="mb-3">
                            <label for="title" class="form-label text-muted small">Заголовок</label>
                            <input type="text" id="title" th:field="*{title}"
                                   class="form-control note-form-input"
                                   placeholder="Введите заголовок" required>
                        </div>

                        <div class="mb-3">
                            <label for="content" class="form-label text-muted small">Содержимое</label>
                            <textarea id="content" th:field="*{content}" rows="15"
                                      class="form-control note-form-input"
                                      placeholder="Введите содержимое в формате Markdown"></textarea>
                        </div>

                        <div class="d-flex gap-2 justify-content-end">
                            <a th:href="${noteId != null} ? @{/notes/{id}(id=${noteId})} : @{/notes}"
                               class="btn nav-pill-link">Отмена</a>
                            <button type="submit" class="btn nav-pill-link active">Сохранить</button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
