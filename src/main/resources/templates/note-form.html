<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(${noteId != null} ? 'StudyNotes — Редактировать' : 'StudyNotes — Новая заметка')}"></head>

<body>
<header th:replace="~{fragments/header :: header}"></header>

<main class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="note-form-card">
                <div class="note-form-header">
                    <h1 class="h5 mb-0"
                        th:text="${noteId != null} ? 'Редактировать заметку' : 'Новая заметка'">
                        Заметка
                    </h1>
                    <p class="text-muted small mb-0 mt-1">Markdown поддерживается</p>
                </div>

                <div class="note-form-body">
                    <form th:action="${noteId != null} ? @{/notes/{id}(id=${noteId})} : @{/notes}"
                          th:object="${noteRequest}"
                          method="post">

                        <div class="mb-3">
                            <label for="title" class="form-label text-muted small">Заголовок</label>
                            <input type="text" id="title" th:field="*{title}"
                                   class="form-control note-form-input"
                                   placeholder="Введите заголовок" required>
                        </div>

                        <div class="mb-3">
                            <label for="content" class="form-label text-muted small">Содержимое</label>

                            <!-- Markdown toolbar -->
                            <div class="md-toolbar">
                                <button type="button" onclick="wrapSelection('**', '**')" title="Жирный (**текст**)"><b>B</b></button>
                                <button type="button" onclick="wrapSelection('*', '*')" title="Курсив (*текст*)"><i>I</i></button>
                                <button type="button" onclick="wrapSelection('~~', '~~')" title="Зачёркнутый (~~текст~~)"><s>S</s></button>
                                <button type="button" onclick="wrapSelection('`', '`')" title="Инлайн-код (`код`)" class="md-toolbar-mono">&lt;/&gt;</button>
                                <button type="button" onclick="insertTemplate('```java\n\n```\n')" title="Блок кода" class="md-toolbar-mono">{}</button>

                                <span class="md-toolbar-divider"></span>

                                <button type="button" onclick="insertBlock('## ')" title="Заголовок H2">H2</button>
                                <button type="button" onclick="insertBlock('### ')" title="Заголовок H3">H3</button>

                                <span class="md-toolbar-divider"></span>

                                <button type="button" onclick="insertBlock('- ')" title="Маркированный список">•</button>
                                <button type="button" onclick="insertBlock('1. ')" title="Нумерованный список">1.</button>
                                <button type="button" onclick="insertBlock('- [ ] ')" title="Чекбокс (задача)">☐</button>
                                <button type="button" onclick="insertBlock('> ')" title="Цитата">❝</button>
                                <button type="button" onclick="insertTemplate('---\n')" title="Разделитель">—</button>

                                <span class="md-toolbar-divider"></span>

                                <div class="position-relative d-inline-block">
                                    <button type="button" onclick="toggleCalloutMenu()" title="Вставить коллаут">☰ ▾</button>
                                    <div id="callout-menu" class="d-none callout-dropdown">
                                        <table class="callout-grid">
                                            <thead>
                                            <tr>
                                                <th></th>
                                                <th>Обычный</th>
                                                <th>Сворач.</th>
                                            </tr>
                                            </thead>
                                            <tbody>
                                            <tr>
                                                <td class="callout-grid-label">📝 Note</td>
                                                <td class="callout-grid-cell" onclick="insertCallout('note', '')">▪</td>
                                                <td class="callout-grid-cell" onclick="insertCallout('note', '-')">−</td>
                                            </tr>
                                            <tr>
                                                <td class="callout-grid-label">💡 Tip</td>
                                                <td class="callout-grid-cell" onclick="insertCallout('tip', '')">▪</td>
                                                <td class="callout-grid-cell" onclick="insertCallout('tip', '-')">−</td>
                                            </tr>
                                            <tr>
                                                <td class="callout-grid-label">⚠️ Warning</td>
                                                <td class="callout-grid-cell" onclick="insertCallout('warning', '')">▪</td>
                                                <td class="callout-grid-cell" onclick="insertCallout('warning', '-')">−</td>
                                            </tr>
                                            <tr>
                                                <td class="callout-grid-label">🔴 Danger</td>
                                                <td class="callout-grid-cell" onclick="insertCallout('danger', '')">▪</td>
                                                <td class="callout-grid-cell" onclick="insertCallout('danger', '-')">−</td>
                                            </tr>
                                            <tr>
                                                <td class="callout-grid-label">ℹ️ Info</td>
                                                <td class="callout-grid-cell" onclick="insertCallout('info', '')">▪</td>
                                                <td class="callout-grid-cell" onclick="insertCallout('info', '-')">−</td>
                                            </tr>
                                            </tbody>
                                        </table>
                                        <div class="callout-dropdown-hint">
                                            <div class="callout-dropdown-hint-label">Результат:</div>
                                            <div class="callout-dropdown-preview">
                                                <div class="callout-dropdown-preview-title">💡 Подсказка</div>
                                                <div class="callout-dropdown-preview-text">Используйте Stream API</div>
                                            </div>
                                            <div class="callout-dropdown-hint-label">Синтаксис:</div>
                                            <div class="callout-dropdown-syntax">&gt; [!tip] Подсказка<br>&gt; Используйте Stream API</div>
                                        </div>
                                    </div>
                                </div>

                            <textarea id="content" th:field="*{content}" rows="15"
                                      class="form-control md-textarea"
                                      placeholder="Введите содержимое в формате Markdown"></textarea>
                        </div>

                        <div class="d-flex gap-2 justify-content-end">
                            <a th:href="${noteId != null} ? @{/notes/{id}(id=${noteId})} : @{/notes}"
                               class="btn nav-pill-link">Отмена</a>
                            <button type="submit" class="btn nav-pill-link active">Сохранить</button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</main>

<!-- Markdown toolbar скрипты -->
<script>
    function wrapSelection(before, after) {
        var ta = document.getElementById('content');
        var start = ta.selectionStart;
        var end = ta.selectionEnd;
        var text = ta.value;
        var selected = text.substring(start, end);

        if (selected) {
            ta.value = text.substring(0, start) + before + selected + after + text.substring(end);
            ta.selectionStart = start + before.length;
            ta.selectionEnd = end + before.length;
        } else {
            ta.value = text.substring(0, start) + before + 'текст' + after + text.substring(end);
            ta.selectionStart = start + before.length;
            ta.selectionEnd = start + before.length + 5;
        }
        ta.focus();
    }

    function insertBlock(prefix) {
        var ta = document.getElementById('content');
        var start = ta.selectionStart;
        var end = ta.selectionEnd;
        var text = ta.value;

        // Находим начало первой выделенной строки
        var lineStart = text.lastIndexOf('\n', start - 1) + 1;
        // Находим конец последней выделенной строки
        var lineEnd = text.indexOf('\n', end);
        if (lineEnd === -1) lineEnd = text.length;

        // Получаем выделенные строки
        var selectedBlock = text.substring(lineStart, lineEnd);
        // Добавляем префикс к каждой строке
        var modified = selectedBlock.split('\n')
            .map(function(line) { return prefix + line; })
            .join('\n');

        ta.value = text.substring(0, lineStart) + modified + text.substring(lineEnd);
        ta.selectionStart = lineStart;
        ta.selectionEnd = lineStart + modified.length;
        ta.focus();
    }
    function insertTemplate(template) {
        var ta = document.getElementById('content');
        var start = ta.selectionStart;
        var text = ta.value;
        var before = text.substring(0, start);
        var needNewline = before.length > 0 && !before.endsWith('\n');
        var prefix = needNewline ? '\n' : '';
        ta.value = before + prefix + template + text.substring(start);
        ta.selectionStart = ta.selectionEnd = start + prefix.length + template.length;
        ta.focus();
    }

    var savedSelection = { start: 0, end: 0 };

    function toggleCalloutMenu() {
        var ta = document.getElementById('content');
        savedSelection.start = ta.selectionStart;
        savedSelection.end = ta.selectionEnd;
        document.getElementById('callout-menu').classList.toggle('d-none');
    }

    function insertCallout(type, fold) {
        var ta = document.getElementById('content');
        var selected = ta.value.substring(savedSelection.start, savedSelection.end);
        var sign = fold || '';
        var content = selected || 'Текст';
        var lines = content.split('\n').map(function(line) { return '> ' + line; }).join('\n');

        // Восстанавливаем выделение и вставляем
        ta.selectionStart = savedSelection.start;
        ta.selectionEnd = savedSelection.end;
        ta.focus();

        var text = ta.value;
        var before = text.substring(0, savedSelection.start);
        var after = text.substring(savedSelection.end);
        var needNewline = before.length > 0 && !before.endsWith('\n');
        var prefix = needNewline ? '\n' : '';
        var template = '> [!' + type + ']' + sign + ' Заголовок\n' + lines + '\n';

        ta.value = before + prefix + template + after;
        ta.selectionStart = ta.selectionEnd = before.length + prefix.length + template.length;
        ta.focus();

        document.getElementById('callout-menu').classList.add('d-none');
    }

    // Закрыть меню коллаутов при клике вне
    document.addEventListener('click', function(e) {
        var menu = document.getElementById('callout-menu');
        if (menu && !menu.parentElement.contains(e.target)) {
            menu.classList.add('d-none');
        }
    });
</script>

<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
