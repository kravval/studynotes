<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(${noteId != null} ? 'StudyNotes — Редактировать' : 'StudyNotes — Новая заметка')}"></head>

<body>
<header th:replace="~{fragments/header :: header}"></header>

<main class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <h1 class="h3 mb-4"
                th:text="${noteId != null} ? 'Редактировать заметку' : 'Новая заметка'">
                Заметка
            </h1>

            <form th:action="${noteId != null} ? @{/notes/{id}(id=${noteId})} : @{/notes}"
                  th:object="${noteRequest}"
                  method="post">

                <div class="mb-3">
                    <label for="title" class="form-label">Заголовок</label>
                    <input type="text" id="title" th:field="*{title}"
                           class="form-control"
                           placeholder="Введите заголовок" required>
                </div>

                <div class="mb-3">
                    <label for="content" class="form-label">Содержимое</label>
                    <textarea id="content" th:field="*{content}" rows="15"
                              class="form-control"
                              placeholder="Введите содержимое в формате Markdown"></textarea>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                    <a th:href="${noteId != null} ? @{/notes/{id}(id=${noteId})} : @{/notes}"
                       class="btn btn-secondary">Отмена</a>
                </div>
            </form>

        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
