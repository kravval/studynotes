<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('StudyNotes — Импорт')}"></head>

<body>
<header th:replace="~{fragments/header :: header}"></header>

<main class="container">
    <h1 class="h3 mb-2">Импорт заметок</h1>
    <p class="text-muted mb-4">Укажите путь к папке с .md файлами (например, папка Obsidian).</p>

    <form action="/import" method="post">
        <div class="mb-3">
            <label for="directoryPath" class="form-label">Путь к директории</label>
            <input type="text" id="directoryPath" name="directoryPath"
                   class="form-control"
                   th:value="${directoryPath}"
                   placeholder="C:/Users/вы/obsidian/notes" required>
        </div>
        <button type="submit" class="btn btn-primary">Импортировать</button>
    </form>

    <!-- Результат -->
    <div th:if="${result}" class="card mt-4">
        <div class="card-body">
            <h5 class="card-title">Результат импорта</h5>

            <p class="mb-1">Найдено файлов: <strong th:text="${result.total}">0</strong></p>
            <p class="mb-1">Импортировано: <strong th:text="${result.imported}">0</strong></p>
            <p class="mb-1">Пропущено: <strong th:text="${result.skipped}">0</strong></p>

            <div th:if="${result.hasErrors()}" class="alert alert-danger mt-3">
                <h6 class="alert-heading">Ошибки</h6>
                <ul class="mb-0">
                    <li th:each="error : ${result.errors}" th:text="${error}">Ошибка</li>
                </ul>
            </div>

            <a th:if="${result.imported > 0}" th:href="@{/notes}"
               class="btn btn-success mt-3">Перейти к заметкам</a>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
