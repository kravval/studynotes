<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('StudyNotes — Импорт')}"></head>

<body>
<header th:replace="~{fragments/header :: header}"></header>

<main>
    <h1>Импорт заметок</h1>
    <p>Укажите путь к папке с .md файлами (например, папка Obsidian).</p>

    <!-- Форма импорта -->
    <form action="/import" method="post">
        <div class="form-group">
            <label for="directoryPath">Путь к директории</label>
            <input type="text" id="directoryPath" name="directoryPath"
                   th:value="${directoryPath}"
                   placeholder="C:/Users/вы/obsidian/notes" required>
        </div>
        <button type="submit" class="btn">Импортировать</button>
    </form>

    <!-- Результат импорта (показывается только после импорта) -->
    <div th:if="${result}" class="import-result">
        <h2>Результат импорта</h2>

        <!-- Общая статистика -->
        <div class="result-stats">
            <p>Найдено файлов: <strong th:text="${result.total}">0</strong></p>
            <p>Импортировано: <strong th:text="${result.imported}">0</strong></p>
            <p>Пропущено (дубликаты или пустые): <strong th:text="${result.skipped}">0</strong></p>
        </div>

        <!-- Ошибки, если есть -->
        <div th:if="${result.hasErrors()}" class="result-errors">
            <h3>Ошибки</h3>
            <ul>
                <li th:each="error : ${result.errors}" th:text="${error}">
                    Текст ошибки
                </li>
            </ul>
        </div>

        <!-- Ссылка на список заметок -->
        <div th:if="${result.imported > 0}" class="result-action">
            <a th:href="@{/notes}" class="btn">Перейти к заметкам</a>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
